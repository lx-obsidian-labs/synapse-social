<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synapse Social</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #FFFFFF; color: #050505; }
    .header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid #E4E6EB; }
    .logo { width: 32px; height: 32px; background: #1877F2; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }
    .header h1 { font-size: 15px; font-weight: 600; flex: 1; }
    .status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #65676B; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #42B72A; }
    .body { padding: 12px; }
    .card { display: flex; align-items: center; gap: 10px; padding: 10px; background: #F0F2F5; border-radius: 8px; margin-bottom: 12px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #E4E6EB; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #65676B; }
    .card .info { flex: 1; }
    .card .name { font-size: 13px; font-weight: 600; }
    .card .sub { font-size: 11px; color: #65676B; }
    .btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; text-align: left; }
    .btn-primary { background: #1877F2; color: white; }
    .btn-primary:hover { background: #166FE5; }
    .btn-secondary { background: #E4E6EB; color: #050505; }
    .btn-secondary:hover { background: #D8DADE; }
    .btn-icon { font-size: 16px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
    .badge-page { background: #E7F3FF; color: #1877F2; }
    .badge-post { background: #E8F5E9; color: #42B72A; }
    .badge-inbox { background: #FFF3E0; color: #F7B928; }
    .badge-insights { background: #F3E5F5; color: #9C27B0; }
    .badge-unknown { background: #F0F2F5; color: #65676B; }
    .section { margin-bottom: 8px; }
    .section-title { font-size: 11px; font-weight: 600; color: #65676B; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding: 0 2px; }
    .actions { display: flex; flex-direction: column; gap: 6px; }
    .footer { padding: 10px 16px; border-top: 1px solid #E4E6EB; display: flex; justify-content: space-between; font-size: 11px; color: #65676B; }
    .footer a { color: #1877F2; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <h1>Synapse Social</h1>
    <div class="status"><span class="dot"></span> Active</div>
  </div>

  <div class="body">
    <div class="card">
      <div class="avatar" id="page-avatar">P</div>
      <div class="info">
        <div class="name" id="page-name">Facebook Page</div>
        <div class="sub" id="page-status">Detecting page...</div>
      </div>
    </div>

    <div class="section" id="page-type-section">
      <div class="section-title">Current Page</div>
      <div id="page-type-display" style="margin-bottom:8px;"></div>
    </div>

    <div class="section">
      <div class="section-title">Actions</div>
      <div class="actions" id="actions-container">
        <button class="btn btn-primary" id="open-panel">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          Open Side Panel
        </button>
      </div>
    </div>
  </div>

  <div class="footer">
    <span id="notif-count">No notifications</span>
    <a id="settings-link">Settings</a>
  </div>

  <script>
    const pageAvatar = document.getElementById('page-avatar')
    const pageName = document.getElementById('page-name')
    const pageStatus = document.getElementById('page-status')
    const pageTypeDisplay = document.getElementById('page-type-display')
    const actionsContainer = document.getElementById('actions-container')
    const openPanel = document.getElementById('open-panel')
    const settingsLink = document.getElementById('settings-link')

    const pageActions = {
      page: [
        { label: '📊 Analyze Page', action: 'analyze' },
        { label: '✍️ Generate Post', action: 'create-post' },
        { label: '📈 View Insights', action: 'insights' },
        { label: '💬 Manage Comments', action: 'comments' },
      ],
      post: [
        { label: '📊 Analyze Engagement', action: 'analyze-post' },
        { label: '🤖 AI Reply Suggestions', action: 'suggest-reply' },
        { label: '🚀 Boost Post', action: 'boost' },
      ],
      inbox: [
        { label: '⚡ Smart Reply', action: 'smart-reply' },
        { label: '🤖 Auto Respond', action: 'auto-respond' },
        { label: '📝 Conversation Summary', action: 'summary' },
      ],
      insights: [
        { label: '🧠 AI Analysis', action: 'ai-analysis' },
        { label: '💡 Recommendations', action: 'recommendations' },
        { label: '📄 Generate Report', action: 'report' },
      ],
      group: [
        { label: '📊 Analyze Group', action: 'analyze-group' },
        { label: '💡 Content Ideas', action: 'suggest-content' },
      ],
      unknown: [
        { label: '🔍 Detect Page', action: 'detect' },
        { label: '🔧 Use Synapse', action: 'open' },
      ],
    }

    const pageTypeLabels = {
      page: 'Facebook Page', post: 'Post', inbox: 'Inbox',
      insights: 'Insights', group: 'Group', unknown: 'Facebook',
    }

    const pageTypeBadges = {
      page: 'badge-page', post: 'badge-post', inbox: 'badge-inbox',
      insights: 'badge-insights', unknown: 'badge-unknown',
    }

    function updatePopup(pageType) {
      const label = pageTypeLabels[pageType] || 'Facebook'
      const badgeClass = pageTypeBadges[pageType] || 'badge-unknown'

      pageTypeDisplay.innerHTML = `<span class="badge ${badgeClass}">${label}</span>`

      const existingBtns = actionsContainer.querySelectorAll('.context-action')
      existingBtns.forEach(b => b.remove())

      const actions = pageActions[pageType] || pageActions.unknown
      actions.forEach(a => {
        const btn = document.createElement('button')
        btn.className = 'btn btn-secondary context-action'
        btn.textContent = a.label
        btn.addEventListener('click', () => {
          chrome.runtime.sendMessage({ type: 'OPEN_SIDEPANEL' })
          window.close()
        })
        actionsContainer.appendChild(btn)
      })
    }

    openPanel.addEventListener('click', () => {
      chrome.runtime.sendMessage({ type: 'OPEN_SIDEPANEL' })
      window.close()
    })

    settingsLink.addEventListener('click', () => {
      chrome.runtime.sendMessage({ type: 'OPEN_SIDEPANEL' })
      window.close()
    })

    // Detect page on popup open
    chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
      if (!tabs[0]?.id) {
        pageStatus.textContent = 'No active tab'
        return
      }

      chrome.tabs.sendMessage(tabs[0].id, { type: 'GET_PAGE_TYPE' }, (response) => {
        if (chrome.runtime.lastError || !response) {
          pageStatus.textContent = 'Not on Facebook'
          pageAvatar.textContent = '?'
          updatePopup('unknown')
          return
        }

        const pt = response.pageType || 'unknown'
        pageStatus.textContent = `${pageTypeLabels[pt] || 'Facebook'}`
        pageAvatar.textContent = (pageTypeLabels[pt] || 'F')[0]

        chrome.tabs.sendMessage(tabs[0].id, { type: 'EXTRACT_PAGE_DATA' }, (dataResp) => {
          if (dataResp?.success && dataResp.data?.pageName) {
            pageName.textContent = dataResp.data.pageName
          }
        })

        updatePopup(pt)
      })
    })
  </script>
</body>
</html>
