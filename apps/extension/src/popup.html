<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synapse Social</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #FFFFFF; color: #050505; }
    .header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid #E4E6EB; }
    .logo { width: 32px; height: 32px; background: #1877F2; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }
    .header h1 { font-size: 15px; font-weight: 600; flex: 1; }
    .status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #65676B; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #42B72A; }
    .body { padding: 12px; }
    .card { display: flex; align-items: center; gap: 10px; padding: 10px; background: #F0F2F5; border-radius: 8px; margin-bottom: 12px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #E4E6EB; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #65676B; }
    .card .info { flex: 1; }
    .card .name { font-size: 13px; font-weight: 600; }
    .card .sub { font-size: 11px; color: #65676B; }
    .btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; text-align: left; }
    .btn-primary { background: #1877F2; color: white; }
    .btn-primary:hover { background: #166FE5; }
    .btn-secondary { background: #E4E6EB; color: #050505; }
    .btn-secondary:hover { background: #D8DADE; }
    .section { margin-bottom: 8px; }
    .section-title { font-size: 11px; font-weight: 600; color: #65676B; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding: 0 2px; }
    .actions { display: flex; flex-direction: column; gap: 6px; }
    .footer { padding: 10px 16px; border-top: 1px solid #E4E6EB; display: flex; justify-content: space-between; font-size: 11px; color: #65676B; }
    .footer a { color: #1877F2; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <h1>Synapse Social</h1>
    <div class="status"><span class="dot"></span> Active</div>
  </div>

  <div class="body">
    <div class="card">
      <div class="avatar">P</div>
      <div class="info">
        <div class="name" id="page-name">Synapse Social Page</div>
        <div class="sub" id="page-status">Connected &middot; Admin</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Quick Actions</div>
      <div class="actions">
        <button class="btn btn-primary" id="open-panel">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          Open Side Panel
        </button>
        <button class="btn btn-secondary" id="extract-data">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Extract Page Data
        </button>
      </div>
    </div>
  </div>

  <div class="footer">
    <span id="notif-count">0 notifications</span>
    <a id="settings-link">Settings</a>
  </div>

  <script>
    const pageName = document.getElementById('page-name')
    const pageStatus = document.getElementById('page-status')
    const openPanel = document.getElementById('open-panel')
    const extractData = document.getElementById('extract-data')
    const settingsLink = document.getElementById('settings-link')

    openPanel.addEventListener('click', () => {
      chrome.runtime.sendMessage({ type: 'OPEN_SIDEPANEL' })
      window.close()
    })

    extractData.addEventListener('click', () => {
      chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
        if (tabs[0]?.id) {
          chrome.tabs.sendMessage(tabs[0].id, { type: 'EXTRACT_PAGE_DATA' }, (response) => {
            if (response?.success) {
              pageName.textContent = response.data.pageTitle || 'Facebook Page'
              pageStatus.textContent = 'Data extracted'
            }
          })
        }
      })
    })

    settingsLink.addEventListener('click', () => {
      chrome.runtime.sendMessage({ type: 'OPEN_SIDEPANEL' })
      window.close()
    })
  </script>
</body>
</html>
