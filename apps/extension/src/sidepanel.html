<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synapse Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #1877F2;
      --primary-hover: #166FE5;
      --success: #42B72A;
      --warning: #F7B928;
      --error: #FA3E3E;
      --bg: #F0F2F5;
      --card: #FFFFFF;
      --border: #E4E6EB;
      --text: #050505;
      --text-secondary: #65676B;
      --radius: 8px;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #BCC0C4; border-radius: 3px; }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 32px; height: 32px;
      background: var(--primary); border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 14px;
    }
    .header h1 { font-size: 16px; font-weight: 600; flex: 1; }
    .header .status {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--text-secondary);
    }
    .header .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

    /* Tabs */
    .tabs {
      display: flex; background: var(--card);
      border-bottom: 1px solid var(--border); padding: 0 12px;
    }
    .tab {
      padding: 10px 16px; font-size: 13px; font-weight: 500;
      color: var(--text-secondary); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.15s;
      background: none; border-top: none; border-left: none; border-right: none;
      font-family: inherit;
    }
    .tab:hover { color: var(--text); background: #F0F2F5; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* Content */
    .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-content.active { display: flex; }

    /* AI Chat */
    .chat-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(24,119,242,0.08), rgba(24,119,242,0.03));
    }
    .chat-header .icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: var(--primary); border-radius: 6px; color: white; font-size: 14px;
    }
    .chat-header .name { font-size: 13px; font-weight: 600; }
    .chat-header .sub { font-size: 10px; color: var(--text-secondary); }

    .messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { display: flex; gap: 8px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .msg.user .msg-avatar { background: var(--primary); color: white; }
    .msg.assistant .msg-avatar { background: #E7F3FF; color: var(--primary); }
    .msg-bubble {
      padding: 8px 14px; border-radius: 16px;
      font-size: 13px; line-height: 1.5; white-space: pre-wrap;
    }
    .msg.user .msg-bubble {
      background: var(--primary); color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: var(--card); color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg-time { font-size: 10px; color: var(--text-secondary); margin-top: 2px; text-align: right; }

    .chat-input-area {
      padding: 10px 16px; border-top: 1px solid var(--border);
      background: var(--card); display: flex; gap: 8px;
    }
    .chat-input-area input {
      flex: 1; padding: 8px 14px; border: 1px solid var(--border);
      border-radius: 20px; font-size: 13px; font-family: inherit;
      outline: none;
    }
    .chat-input-area input:focus { border-color: var(--primary); }
    .chat-input-area button {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary); color: white; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    .chat-input-area button:hover { background: var(--primary-hover); }
    .chat-input-area button:disabled { background: #BCC0C4; cursor: default; }

    .suggestions {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 8px 16px; background: var(--card);
    }
    .suggestion-chip {
      padding: 4px 10px; border-radius: 14px;
      border: 1px solid var(--border); background: none;
      font-size: 11px; color: var(--text-secondary); cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .suggestion-chip:hover { background: #F0F2F5; border-color: var(--primary); color: var(--primary); }

    .typing-indicator {
      display: flex; gap: 4px; align-items: center;
      padding: 12px 16px;
    }
    .typing-indicator span {
      width: 8px; height: 8px; border-radius: 50%;
      background: #BCC0C4; animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Generate tab */
    .generate-content { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
    .generate-content textarea {
      flex: 1; min-height: 120px; padding: 12px;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 13px; font-family: inherit; resize: none; outline: none;
    }
    .generate-content textarea:focus { border-color: var(--primary); }
    .generate-content .btn-row { display: flex; gap: 8px; }
    .generate-content .btn {
      padding: 8px 20px; border-radius: var(--radius);
      font-size: 13px; font-weight: 600; border: none; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .generate-content .btn-primary { background: var(--primary); color: white; }
    .generate-content .btn-primary:hover { background: var(--primary-hover); }
    .generate-content .btn-primary:disabled { background: #BCC0C4; cursor: default; }
    .generate-content .btn-secondary { background: var(--border); color: var(--text); }
    .generate-content .btn-secondary:hover { background: #D8DADE; }
    .generate-content .templates {
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .generate-content .templates button {
      padding: 4px 10px; border-radius: 14px;
      border: 1px solid var(--border); background: none;
      font-size: 11px; cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .generate-content .templates button:hover {
      background: #E7F3FF; border-color: var(--primary); color: var(--primary);
    }
    .generate-result {
      padding: 14px; border-radius: var(--radius);
      background: #F7F8FA; border: 1px solid var(--border);
      font-size: 13px; line-height: 1.6; white-space: pre-wrap;
      display: none;
    }
    .generate-result.visible { display: block; }

    .count { font-size: 11px; color: var(--text-secondary); text-align: right; padding: 0 2px; }

    .tool-btn {
      padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--card);
      font-size: 12px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .tool-btn:hover { background: #E7F3FF; border-color: var(--primary); color: var(--primary); }
    .tool-btn:active { transform: scale(0.97); }

    /* Page data bar */
    .page-data {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: var(--card);
      border-bottom: 1px solid var(--border); font-size: 12px;
    }
    .page-data .label { color: var(--text-secondary); }
    .page-data .value { font-weight: 500; }
    .page-data .pill {
      padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600;
    }
    .page-data .pill.page { background: #E7F3FF; color: var(--primary); }
    .page-data .pill.post { background: #E8F5E9; color: var(--success); }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">S</div>
    <h1>Synapse</h1>
    <div class="status"><span class="dot"></span> <span id="page-type-label">Facebook</span></div>
  </div>

  <!-- Page data bar -->
  <div class="page-data" id="page-data-bar">
    <span class="label">Page:</span>
    <span class="value" id="page-data-name">—</span>
    <span class="pill page" id="page-type-pill">Page</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="chat">AI Chat</button>
    <button class="tab" data-tab="generate">Generate</button>
    <button class="tab" data-tab="tools">Tools</button>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- AI Chat Tab -->
    <div class="tab-content active" id="tab-chat">
      <div class="messages" id="chat-messages">
        <div class="msg assistant">
          <div class="msg-avatar">S</div>
          <div class="msg-bubble">Hi! I'm your AI assistant. Ask me anything about your Facebook Page.</div>
        </div>
      </div>
      <div class="suggestions" id="suggestions">
        <button class="suggestion-chip" data-prompt="Create a Facebook post about our new product">📝 Create a post</button>
        <button class="suggestion-chip" data-prompt="Analyze my page engagement">📊 Analyze page</button>
        <button class="suggestion-chip" data-prompt="Suggest content ideas for this week">💡 Content ideas</button>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Ask Synapse anything..." />
        <button id="chat-send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

    <!-- Generate Tab -->
    <div class="tab-content" id="tab-generate">
      <div class="generate-content">
        <div class="templates" id="templates">
          <button data-prompt="Create a post announcing a new product launch. Include excitement and key features.">Product Launch</button>
          <button data-prompt="Create a question-based post to drive engagement and comments.">Engagement</button>
          <button data-prompt="Create a promotional post with a special offer or discount.">Promotion</button>
          <button data-prompt="Create a post inviting people to an upcoming event or webinar.">Event</button>
          <button data-prompt="Create a post celebrating a milestone or achievement.">Milestone</button>
        </div>
        <textarea id="generate-prompt" placeholder="Describe the post you want to create..."></textarea>
        <div class="count"><span id="char-count">0</span> characters</div>
        <div class="btn-row">
          <button class="btn btn-primary" id="generate-btn">✨ Generate</button>
          <button class="btn btn-secondary" id="copy-btn" style="display:none;">📋 Copy</button>
        </div>
        <div class="generate-result" id="generate-result"></div>
      </div>
    </div>

    <!-- Tools Tab -->
    <div class="tab-content" id="tab-tools">
      <div style="padding:12px 16px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1;">
        <div style="font-size:11px;font-weight:600;color:#65676B;text-transform:uppercase;letter-spacing:0.5px;padding:4px 0;">Page Navigation</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="tool-btn" data-tool="scroll_to_top">⬆️ Scroll Top</button>
          <button class="tool-btn" data-tool="scroll_to_bottom">⬇️ Scroll Bottom</button>
        </div>

        <div style="font-size:11px;font-weight:600;color:#65676B;text-transform:uppercase;letter-spacing:0.5px;padding:8px 0 4px;">Post Actions</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="tool-btn" data-tool="like_first_post">👍 Like First Post</button>
          <button class="tool-btn" data-tool="click_like">❤️ Click Like</button>
          <button class="tool-btn" data-tool="click_comment">💬 Open Comments</button>
          <button class="tool-btn" data-tool="click_share">🔗 Click Share</button>
        </div>

        <div style="font-size:11px;font-weight:600;color:#65676B;text-transform:uppercase;letter-spacing:0.5px;padding:8px 0 4px;">Page Content</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="tool-btn" data-tool="get_visible_text">📄 Get Page Text</button>
          <button class="tool-btn" data-tool="highlight_elements">🔦 Highlight Posts</button>
        </div>

        <div style="font-size:11px;font-weight:600;color:#65676B;text-transform:uppercase;letter-spacing:0.5px;padding:8px 0 4px;">Custom</div>
        <div style="display:flex;gap:6px;">
          <input type="text" id="tool-selector" placeholder="CSS selector..." style="flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;outline:none;" />
          <button class="tool-btn" id="tool-click-el" style="flex-shrink:0;">Click</button>
        </div>
        <div style="display:flex;gap:6px;">
          <input type="text" id="tool-fill-text" placeholder="Text to type..." style="flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;outline:none;" />
          <button class="tool-btn" id="tool-fill-btn" style="flex-shrink:0;">Fill</button>
        </div>

        <div id="tool-result" style="display:none;margin-top:8px;padding:10px;border-radius:8px;background:#F7F8FA;border:1px solid var(--border);font-size:12px;line-height:1.5;white-space:pre-wrap;max-height:200px;overflow-y:auto;"></div>
      </div>
    </div>

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
